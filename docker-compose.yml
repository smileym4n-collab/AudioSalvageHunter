services:
  audio-salvage-hunter:
    build: .
    container_name: audio-salvage-hunter
    restart: unless-stopped
    ports:
      - "8085:8080"
    env_file:
      - .env
    environment:
      ASH_DATA_DIR: /app/data
      ASH_DB_PATH: /app/data/audio_salvage_hunter.sqlite3
      DATABASE_URL: sqlite:////app/data/audio_salvage_hunter.sqlite3
      ASH_CONFIG_PATH: /app/config/config.yaml
      TZ: ${TZ:-Europe/London}
    volumes:
      - ash_data:/app/data
      - ./config.yaml:/app/config/config.yaml:ro
      - ash_reports:/app/reports
      - ash_logs:/app/logs
      - ash_exports:/app/exports
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  ash_data:
  ash_reports:
  ash_logs:
  ash_exports:
