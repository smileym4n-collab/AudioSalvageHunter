{% extends "base.html" %}
{% block title %}Login - Audio Salvage Hunter{% endblock %}
{% block content %}
<div class="card shadow-sm auth-card app-section-card">
  <div class="card-body p-4 p-lg-5">
    <div class="auth-card-header">
      <span class="auth-brand-logo">
        <img src="/static/site-logo.png" alt="Audio Salvage Hunter">
      </span>
      <div>
        <h1 class="h3 mb-1">Audio Salvage Hunter</h1>
        <p class="text-muted mb-0">Sign in to manage scans, donors, settings, and reports.</p>
      </div>
    </div>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="post">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="mb-3">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn btn-primary w-100">Login</button>
    </form>
  </div>
</div>
{% endblock %}
